name: pdf_pro_reader
description: "A privacy-first, open-source Android PDF reader and editor. No ads, no subscriptions, no tracking."
publish_to: 'none' # This is not a library, it's an app.

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # PDF Engine (The core)
  pdf: ^3.11.0          # Pure Dart PDF generation and modification
  printing: ^5.13.0     # Previewing, printing, and sharing PDFs

  # File Management (Critical for Android Scoped Storage)
  file_picker: ^8.1.4   # Selecting files from local Android storage
  path_provider: ^2.1.3 # Managing temporary directories for edited files
  permission_handler: ^11.3.1 # Requesting necessary storage permissions

  # Utilities
  google_fonts: ^6.2.1  # Professional typography for a premium feel

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true