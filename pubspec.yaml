name: cloudnex_pdf_reader
description: "A professional PDF reader with RAG integration and editing tools."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # PDF Engine
  syncfusion_flutter_pdfviewer: ^27.1.1
  syncfusion_flutter_pdf: ^27.1.1
  syncfusion_flutter_core: ^27.1.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage (Document Library)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # AI Integration
  google_generative_ai: ^0.4.5

  # UI & UX
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^11.0.0
  google_fonts: ^6.2.1

  # Utilities
  shared_preferences: ^2.3.2
  file_picker: ^8.1.3
  share_plus: ^10.1.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

dependency_overrides:
  js: ^0.7.1
