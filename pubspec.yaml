name: cloudnex_pdf_reader
description: "A professional PDF reader with RAG integration and editing tools."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.5.0'

dependencies:
  flutter:
    sdk: flutter
  # Syncfusion PDF Viewer for UI and interaction
  syncfusion_flutter_pdfviewer: 33.2.13
  # Syncfusion PDF library for document editing, saving, and annotations
  syncfusion_flutter_pdf: 33.2.13
  # File picking functionality
  file_picker: ^8.1.0
  syncfusion_flutter_core: 33.2.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true