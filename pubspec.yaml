name: pdf_pro_reader
description: "A privacy-first, open-source Android PDF reader and editor. No ads, no subscriptions, no tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # PDF Engine & Viewer
  pdf: ^3.11.0          
  printing: ^5.13.0     
  pdfrx: ^2.2.0          # Added this for high-performance viewing

  # File Management 
  file_picker: ^8.1.4   
  path_provider: ^2.1.3 
  permission_handler: ^11.3.1 

  # State Management & Utilities
  provider: ^6.1.2       # Moved here from dev_dependencies
  google_fonts: ^6.2.1  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true